# Pre-commit framework — https://pre-commit.com/
#
# Install locally once:
#     pip install pre-commit
#     pre-commit install
#
# Then every `git commit` runs the hooks below. Hook versions are pinned and
# can be bumped with `pre-commit autoupdate`. Dependabot's `pre-commit`
# ecosystem (when enabled) will do the same via PRs.
#
# These hooks are ADDITIVE to the OpenSpec git hooks installed by setup.sh —
# they run before the OpenSpec pre-commit hook.
repos:
  # ── Generic repo hygiene ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Secret scanning ───────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── Shell scripts ─────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ── YAML formatting / lint ────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint]

  # ── Markdown linting ──────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--disable, MD013, MD033, MD041]

  # ── Conventional commits (optional — uncomment to enforce) ────────────
  # - repo: https://github.com/compilerla/conventional-pre-commit
  #   rev: v3.4.0
  #   hooks:
  #     - id: conventional-pre-commit
  #       stages: [commit-msg]
  #       args: []

# Prevent noisy runs on unrelated autogenerated files
exclude: |
  (?x)^(
    \.git/.*|
    node_modules/.*|
    vendor/.*|
    dist/.*|
    build/.*
  )$
