name: OpenSpec Bootstrap

on:
  push:
    branches: [main, master]
  # Fires when a repo is created from this template (covers "Use this template" flow).
  # repo-init.yml handles creating `main` if needed; this workflow creates the setup issue.
  create:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: spec-bootstrap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap-check:
    name: Check OpenSpec Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check for placeholder tokens
        id: check
        run: |
          if grep -q '{{' .openspec/config.yaml; then
            echo "needs_setup=true" >> "$GITHUB_OUTPUT"
            echo "Project config has placeholder values — will create setup issue."
          else
            echo "needs_setup=false" >> "$GITHUB_OUTPUT"
            echo "✓ OpenSpec config is fully configured."
          fi

      - name: Create setup issue (if not already open)
        if: steps.check.outputs.needs_setup == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if a setup issue already exists (idempotent across pushes)
          EXISTING=$(gh issue list --label "setup" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Setup issue already open — skipping creation."
            exit 0
          fi

          gh label create setup --color "0075ca" --description "Project setup required" 2>/dev/null || true

          gh issue create \
            --title "Complete OpenSpec configuration" \
            --label "setup" \
            --body "## OpenSpec Setup Required

          This repository was created with OpenSpec enforcement, but \`.openspec/config.yaml\`
          still has placeholder values that need to be filled in.

          ### Recommended: Open in Claude Code (AI-guided setup)

          1. Clone this repo and open it in [Claude Code](https://claude.ai/code)
          2. Claude Code will read \`CLAUDE.md\` and automatically detect the unconfigured state
          3. It will ask you the setup questions and write the answers into \`config.yaml\`
          4. You'll be up and running in minutes

          ### Works from the GitHub UI too

          If you created this repo using **Use this template** on GitHub:
          - Open a Codespace — \`setup.sh\` runs automatically via \`.devcontainer\`
          - Or clone locally and open in Claude Code

          ### Manual Setup

          1. Edit \`.openspec/config.yaml\` — replace all \`{{PLACEHOLDER}}\` values
          2. Run \`bash setup.sh\` to install git hooks
          3. Run \`scripts/openspec scaffold 'your first feature'\` to create your first spec
          4. Run \`scripts/openspec check\` to validate

          | File | Purpose |
          |------|---------|
          | \`.openspec/config.yaml\` | Project configuration |
          | \`.openspec/onboarding.yaml\` | Questions Claude Code will ask |
          | \`CLAUDE.md\` | AI agent instructions |
          | \`.devcontainer/devcontainer.json\` | Auto-runs \`setup.sh\` in Codespaces |

          ---
          *This issue closes automatically once \`config.yaml\` has no \`{{PLACEHOLDER}}\` tokens.*"

      - name: Close setup issue when config is complete
        if: steps.check.outputs.needs_setup == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list --label "setup" --state open --json number --jq '.[0].number // empty')
          if [ -n "$ISSUE" ]; then
            gh issue close "$ISSUE" --comment "OpenSpec configuration is complete — \`.openspec/config.yaml\` has no placeholder tokens. Closing."
            echo "Closed setup issue #$ISSUE"
          fi
