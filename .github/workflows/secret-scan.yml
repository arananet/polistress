# Secret scanning with gitleaks.
# Docs: https://github.com/gitleaks/gitleaks-action
#
# Runs on every push and PR. Fails the build if any leak is detected.
# A .gitleaks.toml at the repo root is optional — gitleaks uses sensible
# defaults out of the box.
name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # needed for full-history scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional — set GITLEAKS_LICENSE for organisational use.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
