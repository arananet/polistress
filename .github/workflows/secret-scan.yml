# Secret scanning with gitleaks.
# Docs: https://github.com/gitleaks/gitleaks-action
#
# Runs on every push and PR. Fails the build if any leak is detected.
# A .gitleaks.toml at the repo root is optional — gitleaks uses sensible
# defaults out of the box.
name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # needed for full-history scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional — set GITLEAKS_LICENSE for organisational use.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
