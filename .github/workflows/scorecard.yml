name: OSSF Scorecard

# Weekly OSSF Scorecard analysis. Surfaces supply-chain regressions
# (unsigned releases, unpinned actions, missing branch protection, etc.)
# and publishes a public trust signal at:
#   https://securityscorecards.dev/viewer/?uri=github.com/<owner>/<repo>
#
# Docs: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    - cron: "27 7 * * 1"   # 07:27 UTC every Monday
  push:
    branches: [main, master]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish_results to OpenSSF API
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results requires the repo to be public; the action
          # transparently no-ops on private repos.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
