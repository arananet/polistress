name: OSSF Scorecard

# Weekly OSSF Scorecard analysis. Surfaces supply-chain regressions
# (unsigned releases, unpinned actions, missing branch protection, etc.)
# and publishes a public trust signal at:
#   https://securityscorecards.dev/viewer/?uri=github.com/<owner>/<repo>
#
# Docs: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    - cron: "27 7 * * 1"   # 07:27 UTC every Monday
  push:
    branches: [main, master]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish_results to OpenSSF API
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results requires the repo to be public; the action
          # transparently no-ops on private repos.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: scorecard-sarif
          path: results.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
        with:
          sarif_file: results.sarif
