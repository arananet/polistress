name: Release

# Tag-driven release pipeline:
#   1. Validate the repo is configured (no {{PLACEHOLDER}} tokens).
#   2. Build a reproducible source tarball from the tagged commit.
#   3. Generate a CycloneDX SBOM.
#   4. Sign artifacts with keyless cosign (Sigstore OIDC, no managed keys).
#   5. Produce SLSA build-provenance attestations.
#   6. Publish a GitHub Release with everything attached.
#
# Companion to sbom.yml: this workflow is the *creator* of releases,
# sbom.yml runs on `release: published` for ad-hoc SBOM regeneration.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3) — must already exist on origin"
        required: true
        type: string

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Refuse to release while config is unconfigured
        run: |
          if grep -q '{{' .openspec/config.yaml 2>/dev/null; then
            echo "::error::.openspec/config.yaml still contains placeholder tokens — refusing to release."
            echo "Run the OpenSpec onboarding flow to fill them in first."
            exit 1
          fi

      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build artifacts
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - name: Checkout (tagged commit)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.preflight.outputs.tag }}
          fetch-depth: 0

      - name: Build source tarball
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          NAME="${GITHUB_REPOSITORY#*/}"
          ARCHIVE="${NAME}-${TAG}.tar.gz"
          # Reproducible: no timestamps from the working tree, only from the commit.
          git archive --format=tar.gz --prefix="${NAME}-${TAG}/" -o "$ARCHIVE" "$TAG"
          ls -l "$ARCHIVE"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@251a468eed47e5082b105c3ba6ee500c0e65a764 # v0.17.7
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Compute SHA-256 checksums
        id: hash
        run: |
          set -euo pipefail
          sha256sum "$ARCHIVE" sbom.cdx.json | tee SHA256SUMS
          echo "sha256=$(sha256sum "$ARCHIVE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: release-artifacts
          path: |
            *.tar.gz
            sbom.cdx.json
            SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  sign-and-attest:
    name: Sign + attest
    needs: [preflight, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write       # cosign keyless signing via Sigstore OIDC
      attestations: write   # SLSA build provenance
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: release-artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign artifacts (keyless)
        run: |
          set -euo pipefail
          for f in *.tar.gz sbom.cdx.json SHA256SUMS; do
            cosign sign-blob --yes --output-signature "${f}.sig" --output-certificate "${f}.pem" "$f"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c # v1.4.4
        with:
          subject-path: |
            *.tar.gz
            sbom.cdx.json

      - name: Re-upload signed bundle
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: release-signed
          path: |
            *.tar.gz
            *.tar.gz.sig
            *.tar.gz.pem
            sbom.cdx.json
            sbom.cdx.json.sig
            sbom.cdx.json.pem
            SHA256SUMS
            SHA256SUMS.sig
            SHA256SUMS.pem
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish GitHub Release
    needs: [preflight, sign-and-attest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download signed bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: release-signed

      - name: Publish release
        uses: softprops/action-gh-release@01570a1f39cb168c169c374c0bee9d7bd4f29f4a # v2.1.0
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.tar.gz.sig
            *.tar.gz.pem
            sbom.cdx.json
            sbom.cdx.json.sig
            sbom.cdx.json.pem
            SHA256SUMS
            SHA256SUMS.sig
            SHA256SUMS.pem
          body: |
            ## Verification

            Verify the source tarball with cosign:
            ```bash
            cosign verify-blob \
              --certificate <name>.tar.gz.pem \
              --signature   <name>.tar.gz.sig \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \
              --certificate-oidc-issuer     'https://token.actions.githubusercontent.com' \
              <name>.tar.gz
            ```

            SLSA build provenance is attached as a separate attestation —
            verify with `gh attestation verify <file> --repo ${{ github.repository }}`.
