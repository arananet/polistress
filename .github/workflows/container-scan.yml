name: Container scan

# Runs Hadolint on every Dockerfile and Trivy on built images / the
# repository filesystem. Skipped automatically when no Dockerfile exists,
# so it's safe to keep enabled in non-container projects.

on:
  pull_request:
    paths:
      - "**/Dockerfile*"
      - "**/.dockerignore"
      - "**/docker-compose*.yml"
      - ".github/workflows/container-scan.yml"
  schedule:
    - cron: "0 5 * * 2"  # weekly Tuesday sweep (catches new CVEs)
  workflow_dispatch:

permissions: read-all

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Dockerfiles
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_dockerfile: ${{ steps.find.outputs.has_dockerfile }}
      dockerfiles: ${{ steps.find.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: find
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) \
                               -not -path './.git/*' -not -path './node_modules/*')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
            echo "dockerfiles=[]" >> "$GITHUB_OUTPUT"
            echo "No Dockerfiles — skipping scan."
          else
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
            printf 'dockerfiles=%s\n' "$(printf '%s\n' "${files[@]}" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
          fi

  hadolint:
    name: Hadolint (Dockerfile lint)
    needs: detect
    if: needs.detect.outputs.has_dockerfile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.detect.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          format: sarif
          output-file: hadolint.sarif
          no-fail: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda # v3.27.1
        with:
          sarif_file: hadolint.sarif
          category: hadolint-${{ strategy.job-index }}

  trivy-fs:
    name: Trivy (filesystem)
    needs: detect
    if: needs.detect.outputs.has_dockerfile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda # v3.27.1
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
