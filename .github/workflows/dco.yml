name: DCO

# Developer Certificate of Origin (https://developercertificate.org/) check.
# Every commit in a PR must carry a `Signed-off-by:` trailer matching the
# commit author. Contributors sign off with `git commit -s`.
#
# Why DCO over a CLA?
#   DCO is lightweight (no external service, no contributor agreement to
#   sign), recognised across the OSS ecosystem, and provides legal
#   provenance equivalent to most CLAs for projects under permissive
#   licences.
#
# Upgrade path: if your project requires stronger commit identity,
# combine DCO with required commit signing (Settings → Rules) — see
# docs/BRANCH_PROTECTION.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: dco-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write   # to post a remediation comment on failure

    steps:
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Signed-off-by on every PR commit
        id: check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MISSING=()
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            AUTHOR_NAME=$(git log -1 --pretty='%an' "$sha")
            AUTHOR_EMAIL=$(git log -1 --pretty='%ae' "$sha")
            EXPECTED="Signed-off-by: ${AUTHOR_NAME} <${AUTHOR_EMAIL}>"
            if ! git log -1 --pretty='%B' "$sha" | grep -qF "$EXPECTED"; then
              SUBJECT=$(git log -1 --pretty='%s' "$sha")
              MISSING+=("${sha:0:7} — ${SUBJECT}")
            fi
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            {
              echo "missing<<EOF"
              printf -- '- %s\n' "${MISSING[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "::error::DCO check failed — see comment on PR"
            exit 1
          fi
          echo "✓ All commits carry a matching Signed-off-by trailer"

      - name: Post remediation comment on failure
        if: failure() && steps.check.outputs.missing != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MISSING: ${{ steps.check.outputs.missing }}
        run: |
          gh pr comment "$PR_URL" --body "$(cat <<EOF
          **DCO check failed.** The following commits do not carry a \`Signed-off-by:\` trailer matching the author:

          ${MISSING}

          To fix:

          \`\`\`
          git rebase HEAD~$(git rev-list --count ${{ github.event.pull_request.base.sha }}..HEAD) --signoff
          git push --force-with-lease
          \`\`\`

          Or for a single new commit: \`git commit -s\`. See [developercertificate.org](https://developercertificate.org/) for what you're signing.
          EOF
          )"
