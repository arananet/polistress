# Generate a CycloneDX SBOM on every release and attach it to the release.
# Docs: https://github.com/anchore/sbom-action
#
# CycloneDX is chosen over SPDX because it's better supported by vulnerability
# scanners (Grype, Trivy, Dependency-Track). Add an spdx variant alongside if
# your compliance process needs it.
name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

jobs:
  sbom:
    name: Generate and publish SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # to attach the SBOM to the release

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.7
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Attach SBOM to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@01570a1f39cb168c169c374c0bee9d7bd4f29f4a # v2.1.0
        with:
          files: sbom.cdx.json
