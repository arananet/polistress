# Generate a CycloneDX SBOM on every release and attach it to the release.
# Docs: https://github.com/anchore/sbom-action
#
# CycloneDX is chosen over SPDX because it's better supported by vulnerability
# scanners (Grype, Trivy, Dependency-Track). Add an spdx variant alongside if
# your compliance process needs it.
name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

jobs:
  sbom:
    name: Generate and publish SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # to attach the SBOM to the release

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@251a468eed47e5082b105c3ba6ee500c0e65a764 # v0.17.7
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Attach SBOM to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@01570a1f39cb168c169c374c0bee9d7bd4f29f4a # v2.1.0
        with:
          files: sbom.cdx.json
