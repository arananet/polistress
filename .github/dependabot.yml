# Dependabot — automated dependency updates.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This template ships GitHub Actions updates enabled (the only ecosystem we
# can assume exists). Uncomment entries below that match your project's
# package managers.
version: 2

updates:
  # ── GitHub Actions (always enabled — every repo has workflows) ──────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # ── npm / pnpm / yarn (uncomment if you ship Node.js code) ──────────────
