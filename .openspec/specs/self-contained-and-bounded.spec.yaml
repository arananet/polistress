# Feature Spec — self-contained-and-bounded
# Makes the template fully self-contained and closes remaining
# audit gaps (cost guards, doc-drift enforcement, agent-instruction
# parity). Status must reach 'review' before any production code.

title: "Make the template self-contained, cost-bounded, and doc-drift-aware"
slug: "self-contained-and-bounded"
type: feature
status: review

author: "Eduardo Arana"
created_at: "2026-05-08"
updated_at: "2026-05-08"

description: |
  Closes the remaining production-readiness gaps surfaced in the audit:

  1. **Self-contained local CLI.**
     The template ships a local `scripts/openspec` POSIX-shell CLI
     that has zero external dependencies (bash + coreutils + git only —
     no yq, jq, python). No extension installs required.

  2. **Cap agent costs per day.**
     `spec-ai-review.yml` and `issue-autofix.yml` consume model tokens
     with no upper bound. A misconfigured PR firehose (or a runaway
     comment loop) can bill an organisation in the four-figures before
     anyone notices. Add a daily-max-runs preflight to both workflows
     that counts past 24h runs via `gh api` and exits gracefully when
     the cap is reached.

  3. **Enforce documentation updates.**
     The spec gate ensures source changes have an OpenSpec spec, but
     nothing forces the README/CHANGELOG to keep pace with shipped
     behavior. Add `doc-drift.yml`: when a PR touches source files,
     it must also touch README.md, CHANGELOG.md, or a doc under
     `docs/`. Opt-out via a `skip-doc-drift` label for true
     no-user-impact changes (refactors, internal renames).

  4. **Tighten AGENTS.md / copilot-instructions.md parity.**
     Both files have weaker spec language than CLAUDE.md (e.g. they
     suggest scaffolding but don't refuse to emit code without a spec).
     Bring them up to par so Codex CLI and Copilot apply the same
     gate Claude Code does — even though the structural enforcement
     (hooks + CI) is what actually blocks bad commits.

  5. **Improve issue-template discoverability of `agent:autofix`.**
     Maintainers need to know the label exists; contributors need to
     know they can request it. Add a mention in `bug_report.yml` and
     `feature_request.yml` config sections.

acceptance_criteria:
  - "A new `scripts/openspec` exists, is executable, depends only on bash + coreutils + git (no yq, jq, python, or external extensions), and supports subcommands: `scaffold <name> [--type bugfix|feature]`, `check [--strict] [--pr <n>]`, `init`, `--help`"
  - "`scripts/openspec scaffold` reads `.openspec/templates/{feature,bugfix}.spec.yaml`, slugifies the name, substitutes `{{FEATURE_NAME}}`, `{{SLUG}}`, `{{STATUS}}`, `{{AUTHOR}}` (from `git config user.name` or `$USER`), `{{DATE}}` (ISO `YYYY-MM-DD`), and writes to `.openspec/specs/<slug>.spec.yaml`. Refuses to overwrite an existing file unless `--force` is passed"
  - "`scripts/openspec check` validates every `*.spec.yaml` under `.openspec/specs/` for: required fields, valid status (draft|review|approved), at least 1 acceptance_criteria item, at least 1 test_plan item. Exits 0 on success, 1 on any failure. `--strict` treats `draft` status as a failure"
  - "`setup.sh` does not install any external extensions and does not require `gh` for non-CI use. Setup succeeds on a machine without `gh` installed"
  - "`.devcontainer/devcontainer.json` does not invoke any extension installs and Codespaces work end-to-end without network access to external repos"
  - "Every reference to external CLI subcommands in markdown, workflow, hook, template, and config file uses `./scripts/openspec <subcommand>` (verified via repo-wide grep)"
  - "A new `.github/workflows/doc-drift.yml` runs on PRs and fails when changed source files (`*.py|*.ts|*.js|*.tsx|*.jsx|*.go|*.java|*.rb|*.rs|*.cpp|*.c|*.cs|*.swift|*.kt|*.php`) are present without a corresponding change to `README.md`, `CHANGELOG.md`, or any file under `docs/`. The check is bypassed when the PR carries the `skip-doc-drift` label"
  - "`doc-drift.yml` skips PRs whose diff is dependency-manifest-only (`package*.json`, `*.lock`, `requirements*.txt`, `pyproject.toml`, `go.mod`, `go.sum`, `Cargo.toml`, `Cargo.lock`, `Gemfile*`, `composer.*`) so Dependabot PRs do not need doc updates"
  - "`spec-ai-review.yml` runs a `cost_guard` preflight job before invoking the agent: reads `agents.spec_review.cost_guard.daily_max_runs` (default 50) from `.openspec/config.yaml`, queries the workflow's last-24h run count via `gh api`, and exits 0 (skip) with a `::warning::` annotation when the cap is reached"
  - "`issue-autofix.yml` runs an analogous `cost_guard` preflight: reads `agents.issue_autofix.cost_guard.daily_max_runs` (default 10), counts last-24h runs, and on cap exhaustion removes the trigger label, comments on the issue explaining the daily cap, and exits cleanly"
  - "`.openspec/config.yaml` gains `agents.spec_review.cost_guard` and `agents.issue_autofix.cost_guard` blocks with `enabled: true`, `daily_max_runs: <int>`, and `window_hours: 24`. Defaults are conservative and documented"
  - "`.github/AGENTS.md` is rewritten to: refuse code generation without a matching spec, use `./scripts/openspec` commands, and explicitly mirror the four CLAUDE.md rules (status gate, test_plan gate, surgical changes, simplicity)"
  - "`.github/copilot-instructions.md` is rewritten to mirror the same gates (with copilot-appropriate phrasing — Copilot autocompletes, it doesn't refuse, so the file emphasises 'suggest scaffolding the spec first')"
  - "`.github/ISSUE_TEMPLATE/bug_report.yml` and `feature_request.yml` include a markdown note at the top explaining that maintainers can apply the `agent:autofix` label to trigger the auto-fix agent (with a link to the agent's goal file)"
  - "`README.md` 'Production checklist' is updated: adds doc-drift + cost-guard items, references the local script"
  - "`CLAUDE.md` Step 0 points to `./scripts/openspec --help` as the sole CLI"

test_plan:
  - "Unit (shellcheck): `scripts/openspec` passes shellcheck with no warnings at the `error` level"
  - "Unit (functional): `scripts/openspec scaffold 'sample feature'` creates `.openspec/specs/sample-feature.spec.yaml` with all placeholders substituted; running it again without `--force` exits non-zero"
  - "Unit (functional): `scripts/openspec check --strict` against the existing specs returns 0; deliberately corrupting a spec (remove `acceptance_criteria`) makes it return 1 with a clear error pointing at the file"
  - "Unit (functional): `scripts/openspec check --pr <n>` works without `gh` installed when the PR diff is in `$GITHUB_HEAD_REF` / `$GITHUB_BASE_REF` env (local-equivalent path)"
  - "Unit (grep): repo-wide grep for external extension references returns zero hits in tracked files"
  - "Unit (yamllint): every new/modified workflow parses cleanly under `.yamllint`"
  - "Unit (grep): every `uses:` in new workflows is followed by a 40-char SHA"
  - "Integration (smoke test): the existing `template-smoke-test.yml` is extended to invoke `scripts/openspec check` on a sandbox copy and assert it exits 0"
  - "Integration (manual on a fork): open a PR that touches a `.py` file with no README/CHANGELOG diff — `doc-drift.yml` fails. Add `## Notes` line to README — passes. Add `skip-doc-drift` label — passes without README change"
  - "Integration (manual on a fork): trigger `spec-ai-review.yml` 51 times in 24h (or set `daily_max_runs: 1` and trigger twice) — second invocation exits early with a warning annotation, no model call made"
  - "Integration (manual on a fork): label an issue 11 times with `agent:autofix` (or set `daily_max_runs: 1` and trigger twice) — second run removes the label, comments, and exits"
  - "Integration (manual): open a Codespace from the template — `scripts/openspec --help` works without any post-create install steps"

qa_notes: |
  The cost-guard `gh api` call uses the workflow's own `GITHUB_TOKEN`,
  which has read access to its own runs by default. No extra secret is
  required.

  Doc-drift purposefully checks for a TOUCH (any change to README /
  CHANGELOG / docs/), not a meaningful change — it is a tripwire, not
  a quality bar. The `spec-ai-review.yml` agent already evaluates whether
  the doc updates are coherent with the spec.

  The local `scripts/openspec` is intentionally minimal. It does not
  reimplement a full interactive init flow or remote-spec sync. When
  that becomes a need, an external tool can be added as an OPTIONAL
  accelerator — but the template does not REQUIRE it.

out_of_scope:
  - "Reimplementing full interactive init mode — the template's onboarding flow is in CLAUDE.md and runs through Claude Code or manual edit"
  - "Token-level cost tracking (per-prompt token counts, dollar estimates) — daily run-count cap is a sufficient circuit breaker for v1"
  - "Replacing the agentic-workflow runtime — still `github/agentic-workflow@v1`, just guarded"
  - "Per-contributor or per-PR-author cost caps — daily org cap is enough; per-author surfaces fairness/abuse questions for a separate spec"
  - "Doc-drift policy that demands README updates for every change — only enforces a TOUCH on user-facing docs and only when source changes are present"
  - "Migration tooling for downstream forks — they keep working with their existing setup"

