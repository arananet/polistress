technical_notes: |
  Why a self-contained local CLI?
    "Fork-and-go" means a brand-new clone has zero install steps beyond
    `bash setup.sh`. Every external tool the template assumes is a
    failure surface a downstream user can hit on day one. The bash
    script is ~150 lines and covers the documented surface.

  Why a per-day run cap instead of a per-PR cap?
    Per-PR concurrency already exists. The new failure mode is
    "many PRs at once" or "pathological label loop". Daily cap is the
    right granularity for those, and it is observable (one number).

  Why doc-drift over README-must-change-on-every-source-change?
    Some source changes have no user-facing impact (renames, internal
    refactors). Forcing a README diff for those is busywork that erodes
    the gate's credibility. Touching ANY of README/CHANGELOG/docs/
    is a low bar that catches the genuine cases without being noisy.

  Why bring AGENTS.md and copilot-instructions.md to parity now?
    Multi-CLI environments (a team using Claude Code, Codex, and Copilot
    in the same repo) get inconsistent behavior if the instruction
    files diverge. The structural enforcement (hooks + CI) catches the
    misses, but consistent CLI behavior reduces churn.

  Why not just leave references as "TODO"?
    A half-removed dependency is worse than either keeping or removing
    it. The local script is a complete replacement for every documented
    surface.

