technical_notes: |
  Why CODEOWNERS gating instead of `permission: write`?
    The user explicitly chose CODEOWNERS-only. The workflow parses
    `.github/CODEOWNERS`, extracts every `@user` and `@org/team` from the
    global `*` rule, and:
      - Direct user match â†’ authorized.
      - Team match â†’ call `GET /orgs/{org}/teams/{team}/memberships/{user}`
        with `GITHUB_TOKEN`. 200 OK with state `active` â†’ authorized.
    If the repo's GITHUB_TOKEN cannot read team membership (default for
    repos outside the team's org), document a fallback: the user adds
    a fine-grained PAT in `secrets.AUTOFIX_TEAM_READ_TOKEN`.

  Why always-draft PRs?
    A draft PR signals 'do not merge yet'. Required reviews + branch
    protection still apply. Humans flip it to ready-for-review only after
    they've read the diff. This removes the worst-case 'agent merges its
    own buggy fix' failure mode entirely.

  Why an explicit `sensitive_paths` list AND a two-key authorization?
    Defense in depth. The path list catches the common case (agent
    accidentally edits CI). The two-key authorization catches the
    intentional-but-risky case (a maintainer wants the agent to touch
    CI and is willing to ask a peer to co-sign). Either gate alone
    would be insufficient.

  Why a hard diff cap?
    Bounds blast radius. A runaway agent that decides the right fix is
    'rewrite the test suite' is automatically blocked from doing so.
    The cap is configurable so teams with larger appetite can raise it
    after building trust.

  Why ship the feature disabled by default?
    The template targets enterprise repos. An agent that opens PRs out
    of the box on first push would be a surprise. Opt-in is safer and
    matches the existing pattern (Slack notifications also default off).

  Pinning policy:
    `github/agentic-workflow@v1` is pinned to a SHA in the workflow file,
    not the floating `v1` tag, per the enterprise-hardening rule.

