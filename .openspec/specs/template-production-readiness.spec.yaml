technical_notes: |
  Why a single `lint.yml` instead of four separate workflows?
    Faster PR feedback (one queue vs four), one required-check name to
    add to branch protection, and shared checkout cache.

  Why DCO over signed commits as the default?
    DCO is contributor-friendly (just `git commit -s`), works without
    GPG/SSH key setup, and is the OSS norm. Signed commits are stricter
    but raise the contributor bar — we ship DCO and document signed
    commits as the upgrade path in BRANCH_PROTECTION.md.

  Why auto-merge only patches?
    Patch updates by SemVer contract are bug-fix-only. Minor updates
    add features (and sometimes deprecations). Major updates break.
    Auto-merging patches is the safe sweet spot — minor/major still
    get a human eye.

  Why a separate release.yml when sbom.yml exists?
    `sbom.yml` runs on an `on: release: published` trigger today —
    it expects a release to already exist. `release.yml` is the *creator*:
    tag → build → SBOM → sign → attest → publish release. The two are
    complementary, not duplicative.

  Why `pull_request_target` for the Dependabot auto-merge workflow?
    `pull_request` events from `dependabot[bot]` run with read-only
    permissions for security reasons. `pull_request_target` runs in
    the context of the base ref with the target's permissions, which
    is required to call `gh pr merge --auto`. Critically, the workflow
    only reads PR metadata — it does NOT check out the PR's code, so
    the standard `pull_request_target` foot-gun doesn't apply.

