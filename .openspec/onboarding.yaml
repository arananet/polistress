# OpenSpec Onboarding Questions
# AI agents: read CLAUDE.md first, then use this file to drive the onboarding interview.
#
# Each question maps to a {{PLACEHOLDER}} in .openspec/config.yaml.
# After collecting answers, write them directly into config.yaml.

version: "1"

questions:
  - id: project.name
    prompt: "What is the name of this project? (short, URL-safe slug preferred, e.g. 'payments-api')"
    required: true
    type: string
    maps_to: "project.name in config.yaml"
    placeholder: "{{PROJECT_NAME}}"

  - id: project.team
    prompt: "What team owns this project? (e.g. 'platform', 'data-eng', 'growth')"
    required: true
    type: string
    maps_to: "project.team in config.yaml"
    placeholder: "{{TEAM_NAME}}"

  - id: project.domain
    prompt: "What domain or product area does this belong to? (e.g. 'payments', 'auth', 'reporting')"
    required: false
    type: string
    default: "engineering"
    maps_to: "project.domain in config.yaml"
    placeholder: "{{PROJECT_DOMAIN}}"

  - id: project.description
    prompt: "One sentence describing what this project does."
    required: true
    type: string
    maps_to: "project.description in config.yaml"
    placeholder: "{{PROJECT_DESCRIPTION}}"

  - id: project.tech_stack
    prompt: "What languages, frameworks, or tools does this project use? (comma-separated, e.g. 'python, fastapi, docker' or 'typescript, react, nextjs')"
    required: false
    type: string
    default: ""
    maps_to: "project.tech_stack in config.yaml — also used to generate shields.io badges in README.md"
    placeholder: "{{TECH_STACK}}"
    hint: |
      Common values: python, javascript, typescript, go, rust, java, csharp, ruby, php, swift, kotlin,
      react, vue, angular, nextjs, express, django, flask, fastapi, spring, dotnet, rails, laravel,
      docker, kubernetes, terraform, azure, aws, gcp, github-actions, postgres, mongodb, redis

  - id: spec.enforce_on_pr
    prompt: "Block PRs that have no spec file changes? (yes/no, default: yes)"
    required: false
    type: boolean
    default: true
    maps_to: "spec.enforce_on_pr in config.yaml"

  - id: spec.enforce_on_commit
    prompt: "Block local commits via pre-commit hook when no spec exists? (yes/no, default: yes)"
    required: false
    type: boolean
    default: true
    maps_to: "spec.enforce_on_commit in config.yaml"

  - id: ci.fail_on_missing_spec
    prompt: "Fail CI when a PR has no spec changes? (yes/no, default: yes)"
    required: false
    type: boolean
    default: true
    maps_to: "ci.fail_on_missing_spec in config.yaml"

  - id: agents.implementation_skills.default
    prompt: "Do you have a preferred domain skill for implementation? (e.g. 'frontend-pro', 'backend-pro', 'devops-pro' — press Enter to skip)"
    required: false
    type: string
    default: null
    maps_to: "agents.implementation_skills.default in config.yaml"

  - id: roles.default_implementer
    prompt: "Default implementer for new specs? (GitHub @user or @org/team — press Enter to skip)"
    required: false
    type: string
    default: null
    maps_to: "roles.default_implementer in config.yaml"

  - id: roles.default_reviewer
    prompt: "Default reviewer for new specs? (GitHub @user or @org/team — press Enter to skip)"
    required: false
    type: string
    default: null
    maps_to: "roles.default_reviewer in config.yaml"

  - id: roles.default_qa
    prompt: "Default QA owner for new specs? (GitHub @user or @org/team — press Enter to skip)"
    required: false
    type: string
    default: null
    maps_to: "roles.default_qa in config.yaml"

  - id: roles.default_product_owner
    prompt: "Default product owner for new specs? (GitHub @user or @org/team — press Enter to skip)"
    required: false
    type: string
    default: null
    maps_to: "roles.default_product_owner in config.yaml"

  - id: project.security_contact
    prompt: "Email address for private vulnerability reports? (used in SECURITY.md and CODE_OF_CONDUCT.md)"
    required: true
    type: string
    default: "security@example.com"
    maps_to: "replace {{SECURITY_CONTACT}} in SECURITY.md, CODE_OF_CONDUCT.md, SUPPORT.md, .github/ISSUE_TEMPLATE/config.yml"
    placeholder: "{{SECURITY_CONTACT}}"

  - id: project.default_branch
    prompt: "Default branch name? (default: 'main')"
    required: false
    type: string
    default: "main"
    maps_to: "used in CHANGELOG.md link footers and branch protection docs"

  - id: testing.test_command
    prompt: "What command runs your test suite? (e.g. 'npm test', 'pytest', 'go test ./...')"
    required: true
    type: string
    maps_to: "testing.test_command in config.yaml"
    placeholder: "{{TEST_COMMAND}}"

  - id: testing.require_tests
    prompt: "Require a test_plan in every spec and fail CI if tests are missing? (yes/no, default: yes)"
    required: false
    type: boolean
    default: true
    maps_to: "testing.require_tests and testing.fail_on_missing_tests and ci.fail_on_missing_tests in config.yaml"

  - id: first_spec
    prompt: "What is the first feature you want to build? I'll scaffold an initial spec file for it. (press Enter to skip)"
    required: false
    type: string
    action: "run `scripts/openspec scaffold '<answer>'` after config is written"

after_completion:
  instructions: |
    After collecting all answers:
    1. Write string values into .openspec/config.yaml by replacing the {{PLACEHOLDER}} tokens.
       For boolean answers: write `true` or `false` (unquoted) to the corresponding field.
    2. Replace {{PROJECT_NAME}} and {{GITHUB_OWNER}} across governance files:
       README.md, SECURITY.md, CONTRIBUTING.md, CODE_OF_CONDUCT.md, SUPPORT.md,
       CHANGELOG.md, .github/CODEOWNERS, .github/FUNDING.yml, and all files
       under .github/ISSUE_TEMPLATE/.
    3. Replace {{SECURITY_CONTACT}} with the answer from project.security_contact
       in SECURITY.md, CODE_OF_CONDUCT.md, and SUPPORT.md.
    4. Replace {{TEAM_NAME}} in .github/CODEOWNERS with a real GitHub team slug
       (or fall back to the individual owner if no team exists yet).
    5. If the user answered the `first_spec` question, run:
          scripts/openspec scaffold "<their answer>"
       and show them the created .openspec/specs/<slug>.spec.yaml file.
    6. Tell the user:
          "OpenSpec is configured. Run `bash setup.sh` to install git hooks.
           After that, any commit touching source files will require a corresponding spec.
           Configure branch protection using docs/BRANCH_PROTECTION.md as a guide."
    7. Offer to help them fill in the acceptance criteria and test_plan for their first spec.
    8. Remind the user that every spec requires a `test_plan` and that CI will fail
       if tests are missing or failing, following DevOps best practices.
